<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="player-info">
                <h2>Player</h2>
                <p class="score" id="playerScore">0</p>
            </div>
            <div class="game-info">
                <h1>PONG</h1>
                <p id="gameStatus">Click Canvas to Start</p>
            </div>
            <div class="player-info">
                <h2>Computer</h2>
                <p class="score" id="computerScore">0</p>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p><strong>Controls:</strong> Mouse Y-axis or Arrow Keys (Up/Down)</p>
            <p><strong>Objective:</strong> Bounce the ball past your opponent to score!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
